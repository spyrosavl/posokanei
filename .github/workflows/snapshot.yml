name: Daily snapshot

on:
  schedule:
    # 04:30 UTC daily (~07:30 Greece). Cron times are UTC and best-effort.
    - cron: "30 4 * * *"
  workflow_dispatch: {}

# Allow the job to push the new snapshot back to the repo.
permissions:
  contents: write

concurrency:
  group: snapshot
  cancel-in-progress: false

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch snapshot
        run: python fetch.py

      - name: Commit snapshot
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Snapshot $(date -u +%Y-%m-%d)"
            git push
          fi
